plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    // Asegúrate de que este namespace sea el que definiste al crear el proyecto
    namespace "cl.eosorio.dipalza.movil"
    compileSdk 36

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    // Moví signingConfigs arriba de buildTypes para asegurar que las variables existan
    signingConfigs {
        debug {
            // Se mantiene la firma por defecto para desarrollo local
        }
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            // IMPORTANTE: Verifica que la ruta en key.properties sea absoluta o relativa a la carpeta android/
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    defaultConfig {
        applicationId "cl.eosorio.dipalza.movil"
        minSdk 21
        targetSdk 36
        versionCode 11
        versionName "2.0.0"
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Cambiado correctamente a release
            signingConfig signingConfigs.release

            // Optimización
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    buildToolsVersion '35.0.0'
    ndkVersion '27.3.13750724'

    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            // Definimos el nuevo nombre
            def projectName = "dipalza"
            def status = variant.name // release o debug
            def version = variant.versionName ?: "0.0.0"
            outputFileName = "${projectName}-${status}-${version}.apk"
        }
    }
}

flutter {
    source "../.."
}

// Opcional: Si tienes dependencias específicas de Android, agrégalas aquí
dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}